# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        # Using a specific SHA for security (as in your original), but ensuring it's a recent version
        uses: ruby/setup-ruby@v1 # v1 automatically points to the latest stable v1.x
        with:
          ruby-version: '3.2'
          # We are disabling bundler-cache here to demonstrate manual caching below
          bundler-cache: true

      # Caching Jekyll Build Artifacts (The Performance Booster)
      # This caches the .jekyll-cache folder to make incremental builds faster
      - name: Cache Jekyll Build Artifacts
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: ${{ runner.os }}-jekyll-build-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-build-

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        # Install gems into the vendor/bundle path so they match the cache path above
        run: |
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build with Jekyll
        # Added '--incremental' to utilize the .jekyll-cache we set up above
        run: bundle exec jekyll build --drafts --incremental --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4